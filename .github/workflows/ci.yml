name: ci

on:
  push:
  pull_request:

jobs:
  test:
    # Test on BOTH OSes. The Windows lane is load-bearing: the cp1252-console P0
    # (a clean verdict crashing with UnicodeEncodeError -> exit 1) escaped review
    # precisely because CI was Linux-only (UTF-8 by default) and CliRunner captures
    # through a UTF-8 buffer — nothing exercised a legacy Windows code page. The
    # cp1252 subprocess tests in tests/test_console_encoding.py only mean something
    # on a real Windows runner.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --with pytest pytest
      - name: Run ruff
        run: uv run --with ruff ruff check .
      - name: Smoke — clean verdict must exit 0 on a legacy code page (real binary, not CliRunner)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          PYTHONIOENCODING: cp1252
          PYTHONUTF8: "0"
        run: uv run python -m agent_run_ledger verdict fixtures/clean_run.json --db ci.sqlite

  live-sdk-gate:
    # The B1 demo-overfit guard (tests/test_live_capture_receipt.py) is gated by
    # pytest.importorskip("agents"). Under the base `test` job (no openai extra)
    # the SDK is absent, so the gate SKIPS — exit 0, silently un-enforced. This
    # job installs the openai extra so the gate actually RUNS, and hard-fails if
    # the SDK is somehow absent (importorskip would otherwise turn absent into a
    # green skip). A skip of this honesty gate must be a CI failure, not a pass.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: SDK must be present (no silent skip)
        run: uv run --extra openai python -c "import agents"
      - name: B1 live-SDK honesty gate (real SDK run grades L1, not fixture L2)
        run: uv run --extra openai --with pytest pytest tests/test_live_capture_receipt.py -v
